<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popoy &amp; Pepay Reviewer</title>
  <style>
    :root {
      --bg: #0f1220;
      --bg2: #171a2e;
      --card: #1e2140;
      --card2: #262a4d;
      --text: #eef0ff;
      --muted: #a2a7cc;
      --line: #2f3560;
      --brand: #7c5cff;
      --brand2: #5cc8ff;
      --good: #3ddc97;
      --bad: #ff6b81;
      --shadow: 0 10px 30px rgba(0, 0, 0, .35);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f5fb;
        --bg2: #ffffff;
        --card: #ffffff;
        --card2: #f0f1fa;
        --text: #1a1c33;
        --muted: #5a5f80;
        --line: #e3e5f2;
        --shadow: 0 10px 30px rgba(60, 60, 120, .12);
      }
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 80% -10%, rgba(124, 92, 255, .18), transparent 60%),
        radial-gradient(1000px 600px at -10% 110%, rgba(92, 200, 255, .15), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 70px
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -.5px
    }

    .logo .mark {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #fff;
      font-size: 19px;
      box-shadow: var(--shadow)
    }

    .tag {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500
    }

    button {
      font-family: inherit;
      font-size: 14px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent
    }

    .btn {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: .15s;
      font-weight: 700
    }

    .btn:hover {
      border-color: var(--brand);
      transform: translateY(-1px)
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      border: none;
      color: #fff
    }

    .btn.ghost {
      background: transparent
    }

    /* Profile picker */
    .profilebar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow)
    }

    .pblabel {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted)
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 8px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: var(--card);
      cursor: pointer;
      transition: .15s;
      color: var(--text);
      font-weight: 800;
      font-size: 15px
    }

    .profile:hover {
      transform: translateY(-1px)
    }

    .profile .av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 19px;
      color: #fff
    }

    .profile[data-user="popoy"] .av {
      background: linear-gradient(135deg, #7c5cff, #5cc8ff)
    }

    .profile[data-user="pepay"] .av {
      background: linear-gradient(135deg, #ff5c9d, #ffab5c)
    }

    .profile[data-user="popoy"].active {
      border-color: #7c5cff;
      box-shadow: 0 0 0 3px rgba(124, 92, 255, .18)
    }

    .profile[data-user="pepay"].active {
      border-color: #ff5c9d;
      box-shadow: 0 0 0 3px rgba(255, 92, 157, .18)
    }

    /* Subject grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px
    }

    .subject {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: .15s;
      box-shadow: var(--shadow);
      text-align: left;
      color: var(--text)
    }

    .subject:hover {
      transform: translateY(-3px);
      border-color: var(--brand)
    }

    .subject .ico {
      font-size: 30px
    }

    .subject h3 {
      margin: 8px 0 2px;
      font-size: 17px
    }

    .subject .meta {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600
    }

    .subject .best {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 800;
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--card2);
      color: var(--muted)
    }

    .subject .best.gold {
      background: rgba(61, 220, 151, .15);
      color: var(--good)
    }

    /* Setup card */
    .box {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--shadow)
    }

    h2 {
      margin: 0 0 6px;
      font-size: 20px
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 14px
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .chip {
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      transition: .15s
    }

    .chip.active {
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #fff;
      border-color: transparent
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 16px
    }

    /* Quiz */
    .progress {
      width: 100%;
      height: 8px;
      background: var(--card);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin-bottom: 10px
    }

    .progress>i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--brand2));
      width: 0;
      transition: .3s
    }

    .counter {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px
    }

    .question {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 18px;
      white-space: pre-wrap
    }

    .opts {
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .opt {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      text-align: left;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: .15s;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.45
    }

    .opt:hover:not(:disabled) {
      border-color: var(--brand);
      transform: translateX(3px)
    }

    .opt .key {
      flex: none;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--card2);
      font-weight: 800;
      font-size: 13px;
      color: var(--muted)
    }

    .opt:disabled {
      cursor: default;
      opacity: .75
    }

    .opt.correct {
      border-color: var(--good);
      background: rgba(61, 220, 151, .12);
      opacity: 1
    }

    .opt.correct .key {
      background: var(--good);
      color: #fff
    }

    .opt.wrong {
      border-color: var(--bad);
      background: rgba(255, 107, 129, .12);
      opacity: 1
    }

    .opt.wrong .key {
      background: var(--bad);
      color: #fff
    }

    .feedback {
      margin-top: 14px;
      font-weight: 800;
      font-size: 15px;
      display: none
    }

    .feedback.good {
      display: block;
      color: var(--good)
    }

    .feedback.bad {
      display: block;
      color: var(--bad)
    }

    /* Results */
    .scorebig {
      font-size: 52px;
      font-weight: 800;
      text-align: center;
      margin: 6px 0
    }

    .scoremsg {
      text-align: center;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 18px
    }

    .missed {
      margin-top: 20px
    }

    .miss {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      font-size: 14px
    }

    .miss .q {
      font-weight: 700;
      margin-bottom: 6px
    }

    .miss .yours {
      color: var(--bad);
      font-weight: 600
    }

    .miss .right {
      color: var(--good);
      font-weight: 600
    }

    .center {
      text-align: center
    }

    .screen {
      display: none;
      animation: fade .25s ease
    }

    .screen.active {
      display: block
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .crumb {
      background: none;
      border: none;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      margin-bottom: 14px;
      font-size: 14px
    }

    .crumb:hover {
      color: var(--text)
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 34px
    }

    .err {
      background: rgba(255, 107, 129, .12);
      border: 1px solid var(--bad);
      border-radius: 12px;
      padding: 16px;
      font-weight: 600
    }

    /* Touch devices: no hover-shift effects (they stick after a tap) */
    @media (hover:none) {

      .btn:hover,
      .profile:hover,
      .subject:hover {
        transform: none
      }

      .opt:hover:not(:disabled) {
        border-color: var(--line);
        transform: none
      }
    }

    /* Phone layout */
    @media (max-width:520px) {
      .wrap {
        padding: 14px 12px 56px
      }

      .logo {
        font-size: 19px
      }

      .logo .mark {
        width: 32px;
        height: 32px;
        font-size: 16px
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px
      }

      .subject {
        padding: 14px 12px
      }

      .subject .ico {
        font-size: 26px
      }

      .subject h3 {
        font-size: 15px
      }

      .box {
        padding: 16px 14px;
        border-radius: 16px
      }

      .question {
        font-size: 17px
      }

      .opt {
        padding: 13px 12px;
        font-size: 14px
      }

      .scorebig {
        font-size: 44px
      }

      .profilebar {
        padding: 10px
      }

      .profile {
        font-size: 14px;
        padding: 7px 13px 7px 7px
      }

      .profile .av {
        width: 32px;
        height: 32px;
        font-size: 17px
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="logo">
        <span class="mark">✦</span>
        <div>Popoy &amp; Pepay Reviewer
          <div class="tag">Multiple-choice practice tests</div>
        </div>
      </div>
    </header>

    <div class="profilebar">
      <span class="pblabel">Who's reviewing?</span>
      <button class="profile" data-user="popoy"><span class="av">👦</span>Popoy</button>
      <button class="profile" data-user="pepay"><span class="av">👧</span>Pepay</button>
    </div>

    <!-- HOME: subject picker -->
    <section class="screen active" id="scr-home">
      <div class="grid" id="subjectGrid"></div>
    </section>

    <!-- SETUP: choose test length -->
    <section class="screen" id="scr-setup">
      <button class="crumb" onclick="go('home')">← All subjects</button>
      <div class="box">
        <h2 id="setupTitle"></h2>
        <p class="hint" id="setupHint"></p>
        <div class="chips" id="lenChips">
          <span class="chip" data-len="10">Quick 10</span>
          <span class="chip" data-len="25">Half 25</span>
          <span class="chip active" data-len="50">Full 50</span>
        </div>
        <div class="row">
          <button class="btn primary" id="startBtn">▶ Start test</button>
        </div>
      </div>
    </section>

    <!-- QUIZ -->
    <section class="screen" id="scr-quiz">
      <button class="crumb" id="quitBtn">✕ Quit test</button>
      <div class="box">
        <div class="progress"><i id="pbar"></i></div>
        <div class="counter"><span id="qCounter"></span><span id="qScore"></span></div>
        <div class="question" id="qText"></div>
        <div class="opts" id="qOpts"></div>
        <div class="feedback" id="qFeed"></div>
        <div class="row" style="justify-content:flex-end">
          <button class="btn primary" id="nextBtn" style="visibility:hidden">Next →</button>
        </div>
      </div>
    </section>

    <!-- RESULTS -->
    <section class="screen" id="scr-result">
      <div class="box">
        <div class="center" style="font-size:44px" id="resEmoji"></div>
        <div class="scorebig" id="resScore"></div>
        <div class="scoremsg" id="resMsg"></div>
        <div class="row" style="justify-content:center">
          <button class="btn primary" id="retryBtn">↻ Try again</button>
          <button class="btn" onclick="go('home')">🏠 All subjects</button>
        </div>
        <div class="missed" id="missedList"></div>
      </div>
    </section>

    <footer id="foot"></footer>
  </div>

  <script>
    // Question banks per reviewer (different grade levels).
    // Popoy: popoy1.xlsx (Math), popoy2.xlsx (MAPEH), popoy3.xlsx (TLE)
    // Pepay: ESP_Topic1_50_Items.xlsx + Remaining_7_Subjects_50_Items.xlsx
    const QUESTION_BANKS = {
 "popoy": [
  {
   "name": "Math",
   "icon": "➗",
   "questions": [
    {
     "q": "What is the product of 12 and 15?",
     "choices": [
      "150",
      "180",
      "200",
      "160"
     ],
     "correct": 1
    },
    {
     "q": "In multiplying polynomials using the vertical method, what is the first step?",
     "choices": [
      "Divide the coefficients",
      "Add the exponents immediately",
      "Align the similar terms vertically",
      "Change the signs of the second row"
     ],
     "correct": 2
    },
    {
     "q": "Multiply 3x^2 by 4x.",
     "choices": [
      "12x^3",
      "12x^2",
      "7x^2",
      "7x^3"
     ],
     "correct": 0
    },
    {
     "q": "Find the product of (x + 2) and (x + 3).",
     "choices": [
      "x^2 + x + 6",
      "x^2 + 6x + 5",
      "x^2 + 5x + 6",
      "2x + 5"
     ],
     "correct": 2
    },
    {
     "q": "What is the product of 25 and 14?",
     "choices": [
      "350",
      "360",
      "250",
      "340"
     ],
     "correct": 0
    },
    {
     "q": "According to the product law of exponents, what is x^m * x^n?",
     "choices": [
      "x^(m/n)",
      "x^(m-n)",
      "x^(m*n)",
      "x^(m+n)"
     ],
     "correct": 3
    },
    {
     "q": "Simplify: a^3 * a^4.",
     "choices": [
      "a^7",
      "a^1",
      "2a^7",
      "a^12"
     ],
     "correct": 0
    },
    {
     "q": "What is the product of 2x^2 and 3x^5?",
     "choices": [
      "5x^10",
      "5x^7",
      "6x^10",
      "6x^7"
     ],
     "correct": 3
    },
    {
     "q": "Simplify: y * y^6.",
     "choices": [
      "y^6",
      "y^8",
      "2y^6",
      "y^7"
     ],
     "correct": 3
    },
    {
     "q": "Which of the following demonstrates the product law of exponents?",
     "choices": [
      "b^2 * b^3 = b^6",
      "b^2 * b^3 = b^5",
      "(b^2)^3 = b^6",
      "b^5 / b^3 = b^2"
     ],
     "correct": 1
    },
    {
     "q": "A mathematical phrase that can contain ordinary numbers, variables, and operators is called an ___.",
     "choices": [
      "Inequality",
      "Equation",
      "Algebraic Expression",
      "Exponent"
     ],
     "correct": 2
    },
    {
     "q": "A symbol, usually a letter, used to represent an unknown number is called a ___.",
     "choices": [
      "Constant",
      "Coefficient",
      "Term",
      "Variable"
     ],
     "correct": 3
    },
    {
     "q": "A fixed value that does not change is called a ___.",
     "choices": [
      "Variable",
      "Constant",
      "Exponent",
      "Base"
     ],
     "correct": 1
    },
    {
     "q": "The number written in front of a variable is known as the ___.",
     "choices": [
      "Power",
      "Numerical Coefficient",
      "Constant",
      "Literal Coefficient"
     ],
     "correct": 1
    },
    {
     "q": "Terms whose variables and their exponents are exactly the same are called ___.",
     "choices": [
      "Dissimilar terms",
      "Constants",
      "Binomials",
      "Similar terms"
     ],
     "correct": 3
    },
    {
     "q": "What is the numerical coefficient in the term -5xy^2?",
     "choices": [
      "x",
      "-5",
      "5",
      "y^2"
     ],
     "correct": 1
    },
    {
     "q": "Identify the numerical coefficient of the term x.",
     "choices": [
      "None",
      "0",
      "1",
      "x"
     ],
     "correct": 2
    },
    {
     "q": "In the expression 4a^2 - 7b + 3, what is the numerical coefficient of b?",
     "choices": [
      "4",
      "3",
      "7",
      "-7"
     ],
     "correct": 3
    },
    {
     "q": "What is the numerical coefficient of -yz?",
     "choices": [
      "1",
      "0",
      "-y",
      "-1"
     ],
     "correct": 3
    },
    {
     "q": "Give the numerical coefficient of 12m^3n.",
     "choices": [
      "12",
      "n",
      "3",
      "m"
     ],
     "correct": 0
    },
    {
     "q": "Add: (2x + 3) + (4x + 1).",
     "choices": [
      "6x + 3",
      "6x + 4",
      "8x^2 + 3",
      "8x + 4"
     ],
     "correct": 1
    },
    {
     "q": "Find the sum of (5y^2 - 2y) and (y^2 + 4y).",
     "choices": [
      "6y^2 - 6y",
      "6y^2 + 2y",
      "5y^2 + 2y",
      "4y^2 + 6y"
     ],
     "correct": 1
    },
    {
     "q": "What is the sum of 3a + 5b and -2a - 3b?",
     "choices": [
      "-a - 2b",
      "a - 2b",
      "a + 2b",
      "5a + 8b"
     ],
     "correct": 2
    },
    {
     "q": "Add the polynomials: (x^2 + 2x + 1) and (2x^2 - x - 3).",
     "choices": [
      "3x^2 + x - 2",
      "3x^2 + 3x - 2",
      "3x^2 - x + 2",
      "2x^2 + x - 4"
     ],
     "correct": 0
    },
    {
     "q": "When adding polynomials, which terms can be combined?",
     "choices": [
      "Constant terms only",
      "Variables with different exponents",
      "Similar terms",
      "All terms"
     ],
     "correct": 2
    },
    {
     "q": "Which of the following is a monomial?",
     "choices": [
      "x^2 - y^2",
      "a + b + c",
      "x + 1",
      "3x^2"
     ],
     "correct": 3
    },
    {
     "q": "An algebraic expression consisting of exactly two terms is a ___.",
     "choices": [
      "Binomial",
      "Trinomial",
      "Monomial",
      "Multinomial"
     ],
     "correct": 0
    },
    {
     "q": "The expression x^2 + 5x + 6 is an example of a ___.",
     "choices": [
      "Equation",
      "Monomial",
      "Trinomial",
      "Binomial"
     ],
     "correct": 2
    },
    {
     "q": "What type of polynomial is 4x^3 - 2x + 1?",
     "choices": [
      "Multinomial",
      "Monomial",
      "Trinomial",
      "Binomial"
     ],
     "correct": 2
    },
    {
     "q": "An expression with four or more terms is generally called a ___.",
     "choices": [
      "Binomial",
      "Multinomial",
      "Trinomial",
      "Monomial"
     ],
     "correct": 1
    },
    {
     "q": "Which of the following pairs are similar terms?",
     "choices": [
      "3x^2 and 3x",
      "2x and -5x",
      "x and y",
      "4ab and 4a"
     ],
     "correct": 1
    },
    {
     "q": "Identify the constant in the expression 3x^2 - 4x + 9.",
     "choices": [
      "x",
      "9",
      "-4",
      "3"
     ],
     "correct": 1
    },
    {
     "q": "Which of the following represents the variables in the term 7xy?",
     "choices": [
      "x and y",
      "7x",
      "7",
      "7y"
     ],

  <script>
    (function () {
      "use strict";
      const $ = s => document.querySelector(s);
      const $$ = s => Array.from(document.querySelectorAll(s));
      const STORE = "reviewr.mc.v1";
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

      /* ---------- state ---------- */
      let st = load();
      function load() {
        try { const raw = JSON.parse(localStorage.getItem(STORE)); if (raw && raw.users) return raw; } catch (e) { }
        return { currentUser: "popoy", users: { popoy: { best: {} }, pepay: { best: {} } } };
      }
      function save() { localStorage.setItem(STORE, JSON.stringify(st)); }
      const me = () => st.users[st.currentUser];
      const bank = () => QUESTION_BANKS[st.currentUser];

      /* ---------- profiles ---------- */
      function renderProfiles() {
        $$(".profile").forEach(p => p.classList.toggle("active", p.dataset.user === st.currentUser));
        const s = document.documentElement.style;
        if (st.currentUser === "pepay") { s.setProperty("--brand", "#ff5c9d"); s.setProperty("--brand2", "#ffab5c"); }
        else { s.setProperty("--brand", "#7c5cff"); s.setProperty("--brand2", "#5cc8ff"); }
        const bk = bank(), tq = bk.reduce((n, sub) => n + sub.questions.length, 0);
        $(".tag").textContent = `${cap(st.currentUser)}'s practice tests · ${bk.length} subjects · ${tq} questions`;
        $("#foot").textContent = "Reviewing as " + cap(st.currentUser) + " · scores are saved on this device";
      }
      $$(".profile").forEach(p => p.onclick = () => {
        st.currentUser = p.dataset.user; save(); renderProfiles(); go("home");
      });

      /* ---------- screens ---------- */
      window.go = function (name) {
        $$(".screen").forEach(x => x.classList.remove("active"));
        $("#scr-" + name).classList.add("active");
        if (name === "home") renderHome();
      };

      /* ---------- home ---------- */
      function renderHome() {
        const g = $("#subjectGrid"); g.innerHTML = "";
        bank().forEach((sub, i) => {
          const b = me().best[sub.name];
          const el = document.createElement("button"); el.className = "subject";
          el.innerHTML = `<div class="ico">${sub.icon}</div><h3></h3>
        <div class="meta">${sub.questions.length} items</div>
        <div class="best ${b && b.pct >= 80 ? 'gold' : ''}">${b ? `Best: ${b.score}/${b.total} (${b.pct}%)` : "Not taken yet"}</div>`;
          el.querySelector("h3").textContent = sub.name;
          el.onclick = () => openSetup(i);
          g.appendChild(el);
        });
      }

      /* ---------- setup ---------- */
      let subIdx = 0, testLen = 50;
      function openSetup(i) {
        subIdx = i;
        const sub = bank()[i];
        $("#setupTitle").textContent = sub.icon + " " + sub.name;
        const b = me().best[sub.name];
        $("#setupHint").textContent = (b ? `${cap(st.currentUser)}'s best: ${b.score}/${b.total} (${b.pct}%). ` : "") +
          "Questions are shuffled every attempt. Answer with the buttons or keys A–D / 1–4.";
        go("setup");
      }
      $$("#lenChips .chip").forEach(c => c.onclick = () => {
        $$("#lenChips .chip").forEach(x => x.classList.remove("active"));
        c.classList.add("active"); testLen = parseInt(c.dataset.len, 10);
      });
      $("#startBtn").onclick = startTest;

      /* ---------- quiz ---------- */
      let order = [], qi = 0, score = 0, missed = [], answered = false;
      function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

      function startTest() {
        const sub = bank()[subIdx];
        order = shuffle(sub.questions.map((_, i) => i)).slice(0, Math.min(testLen, sub.questions.length));
        qi = 0; score = 0; missed = [];
        go("quiz"); drawQ();
      }

      function drawQ() {
        const sub = bank()[subIdx];
        const q = sub.questions[order[qi]];
        answered = false;
        $("#pbar").style.width = Math.round(qi / order.length * 100) + "%";
        $("#qCounter").textContent = `${sub.icon} ${sub.name} · Question ${qi + 1} of ${order.length}`;
        $("#qScore").textContent = `Score: ${score}`;
        $("#qText").textContent = q.q;
        $("#qFeed").className = "feedback";
        $("#nextBtn").style.visibility = "hidden";
        const box = $("#qOpts"); box.innerHTML = "";
        q.choices.forEach((c, i) => {
          const b = document.createElement("button"); b.className = "opt";
          const k = document.createElement("span"); k.className = "key"; k.textContent = "ABCD"[i];
          b.append(k, document.createTextNode(" " + c));
          b.onclick = () => pick(i, b);
          box.appendChild(b);
        });
      }

      function pick(i, btn) {
        if (answered) return;
        answered = true;
        const sub = bank()[subIdx];
        const q = sub.questions[order[qi]];
        const opts = $$("#qOpts .opt");
        opts.forEach(o => o.disabled = true);
        opts[q.correct].classList.add("correct");
        if (i === q.correct) {
          score++;
          $("#qScore").textContent = `Score: ${score}`;
          $("#qFeed").className = "feedback good"; $("#qFeed").textContent = "✓ Correct!";
        } else {
          btn.classList.add("wrong");
          $("#qFeed").className = "feedback bad";
          $("#qFeed").textContent = "✗ The correct answer is " + "ABCD"[q.correct] + ".";
          missed.push({ q: q.q, yours: q.choices[i], right: q.choices[q.correct] });
        }
        $("#nextBtn").style.visibility = "visible";
        $("#nextBtn").textContent = qi === order.length - 1 ? "See results →" : "Next →";
        $("#nextBtn").focus();
      }

      $("#nextBtn").onclick = () => {
        if (!answered) return;
        if (qi === order.length - 1) { finish(); return; }
        qi++; drawQ();
      };
      $("#quitBtn").onclick = () => { if (confirm("Quit this test? Progress won't be saved.")) go("home"); };

      function finish() {
        const sub = bank()[subIdx];
        const total = order.length;
        const pct = Math.round(score / total * 100);
        const b = me().best[sub.name];
        if (!b || pct > b.pct || (pct === b.pct && total > b.total)) {
          me().best[sub.name] = { score, total, pct }; save();
        }
        $("#resEmoji").textContent = pct >= 90 ? "🏆" : pct >= 75 ? "🎉" : pct >= 50 ? "👍" : "📖";
        $("#resScore").textContent = `${score} / ${total}`;
        $("#resMsg").textContent = `${pct}% · ${cap(st.currentUser)} on ${sub.name} — ` +
          (pct >= 90 ? "Amazing!" : pct >= 75 ? "Great job!" : pct >= 50 ? "Getting there, keep practicing!" : "Review the misses below and try again!");
        const ml = $("#missedList"); ml.innerHTML = "";
        if (missed.length) {
          const h = document.createElement("h2"); h.textContent = "Review your " + missed.length + " missed item" + (missed.length === 1 ? "" : "s");
          h.style.fontSize = "16px"; ml.appendChild(h);
          missed.forEach(m => {
            const d = document.createElement("div"); d.className = "miss";
            const q = document.createElement("div"); q.className = "q"; q.textContent = m.q;
            const y = document.createElement("div"); y.className = "yours"; y.textContent = "✗ Your answer: " + m.yours;
            const r = document.createElement("div"); r.className = "right"; r.textContent = "✓ Correct: " + m.right;
            d.append(q, y, r); ml.appendChild(d);
          });
        }
        go("result");
      }
      $("#retryBtn").onclick = startTest;

      /* ---------- keyboard ---------- */
      document.addEventListener("keydown", e => {
        if (!$("#scr-quiz").classList.contains("active")) return;
        const k = e.key.toLowerCase();
        const map = { a: 0, b: 1, c: 2, d: 3, "1": 0, "2": 1, "3": 2, "4": 3 };
        if (k in map) {
          const opts = $$("#qOpts .opt");
          if (opts[map[k]] && !answered) opts[map[k]].click();
        } else if (k === "enter" && answered) { $("#nextBtn").click(); }
      });

      /* ---------- init ---------- */
      renderProfiles(); renderHome();
    })();
  </script>
</body>

</html>
